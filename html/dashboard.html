<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | KAION</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <a class="logo text-logo" href="dashboard.html">KAION</a>
            <nav>
                <a class="active" href="dashboard.html">Dashboard</a>
                <a href="produtos.html">Produtos</a>
                <a href="funil.html">Funil</a>
                <a href="relatorios.html">Relatórios</a>
            </nav>
        </aside>

        <main class="content">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Resumo do dia</p>
                    <h1>Dashboard</h1>
                </div>
                <div class="user-actions">
                    <span id="userNome">Carregando...</span>
                    <a class="btn ghost" href="php/logout.php">Sair</a>
                </div>
            </header>

            <section class="metric-grid">
                <article class="metric-card"><span>Total</span><strong id="totalProdutos">0</strong></article>
                <article class="metric-card"><span>Ideias</span><strong id="ideia">0</strong></article>
                <article class="metric-card"><span>Em teste</span><strong id="teste">0</strong></article>
                <article class="metric-card"><span>Lançados</span><strong id="lancados">0</strong></article>
            </section>

            <section class="split-grid">
                <article class="panel">
                    <div class="panel-heading">
                    <h2>Últimos produtos</h2>
                        <a class="btn small" href="novo_produto.html">Novo produto</a>
                    </div>
                    <div id="produtosLista" class="recent-list"></div>
                </article>
                <article class="panel">
                    <div class="panel-heading">
                        <h2>Como está o funil</h2>
                    </div>
                    <div id="funilResumo" class="pipeline-bars"></div>
                </article>
            </section>
        </main>
    </div>
    <script src="js/app.js"></script>
    <script src="js/script_dashboard.js"></script>
</body>
</html>
