<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo produto | KAION</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <a class="logo text-logo" href="dashboard.html">KAION</a>
            <nav>
                <a href="dashboard.html">Dashboard</a>
                <a href="produtos.html">Produtos</a>
                <a href="funil.html">Funil</a>
                <a href="relatorios.html">Relatórios</a>
            </nav>
        </aside>

        <main class="content">
            <header class="topbar">
                <div>
                    <p class="eyebrow" id="subtituloProduto">Vamos cadastrar</p>
                    <h1 id="tituloProduto">Novo produto</h1>
                </div>
                <a class="btn ghost" href="produtos.html">Voltar</a>
            </header>

            <form id="formProduto" class="panel product-form">
                <input type="hidden" name="id">
                <section>
                    <h2>Informações principais</h2>
                    <div class="form-grid">
                        <label>Nome do produto
                            <select name="nome" required>
                                <option value="">Selecione</option>
                                <option value="Coxinha de frango">Coxinha de frango</option>
                                <option value="Empada de palmito">Empada de palmito</option>
                                <option value="Pastel assado de carne">Pastel assado de carne</option>
                                <option value="Enroladinho de salsicha">Enroladinho de salsicha</option>
                                <option value="Kibe recheado">Kibe recheado</option>
                                <option value="Pao de queijo">Pao de queijo</option>
                                <option value="Suco natural de laranja">Suco natural de laranja</option>
                                <option value="Refrigerante lata">Refrigerante lata</option>
                                <option value="Agua mineral">Agua mineral</option>
                            </select>
                        </label>
                        <label>Categoria
                            <select name="categoria" required>
                                <option value="">Selecione</option>
                                <option value="Salgado frito">Salgado frito</option>
                                <option value="Salgado assado">Salgado assado</option>
                                <option value="Bebida natural">Bebida natural</option>
                                <option value="Bebida industrializada">Bebida industrializada</option>
                            </select>
                        </label>
                        <label>Status
                            <select name="status" required>
                                <option value="ideia">Ideia</option>
                                <option value="desenvolvimento">Desenvolvimento</option>
                                <option value="teste">Teste</option>
                                <option value="aprovacao">Aprovação</option>
                                <option value="lancado">Lançado</option>
                                <option value="arquivado">Arquivado</option>
                            </select>
                        </label>
                        <label>Prioridade
                            <select name="prioridade">
                                <option value="media">Média</option>
                                <option value="alta">Alta</option>
                                <option value="baixa">Baixa</option>
                            </select>
                        </label>
                        <label>Responsável
                            <select name="responsavel">
                                <option value="">Selecione</option>
                                <option value="Andrey">Andrey</option>
                                <option value="Nicolly">Nicolly</option>
                                <option value="Talyssa">Talyssa</option>
                                <option value="Matheus">Matheus</option>
                                <option value="Pedro">Pedro</option>
                            </select>
                        </label>
                        <label>Mercado alvo
                            <select name="mercado_alvo">
                                <option value="">Selecione</option>
                                <option value="Cantina escolar">Cantina escolar</option>
                                <option value="Eventos corporativos">Eventos corporativos</option>
                                <option value="Encomendas para festas">Encomendas para festas</option>
                                <option value="Venda no balcao">Venda no balcao</option>
                            </select>
                        </label>
                    </div>
                    <label>Descrição<textarea name="descricao" rows="4"></textarea></label>
                </section>

                <section>
                    <h2>Potencial do produto</h2>
                    <div class="form-grid">
                        <label>Custo estimado (R$)<input name="custo_estimado" type="number" min="0" step="0.01"></label>
                        <label>Potencial de receita (R$)<input name="potencial_receita" type="number" min="0" step="0.01"></label>
                        <label>Previsão de lançamento<input name="data_lancamento_prevista" type="date"></label>
                        <label>Risco
                            <select name="risco">
                                <option value="baixo">Baixo</option>
                                <option value="medio">Médio</option>
                                <option value="alto">Alto</option>
                            </select>
                        </label>
                    </div>
                </section>

                <section>
                    <h2>Receita e testes</h2>
                    <div class="form-grid">
                        <label>Versão da receita<input name="versao_receita" value="v1"></label>
                        <label>Resultado do teste
                            <select name="resultado_teste">
                                <option value="nao_testado">Não testado</option>
                                <option value="aprovado">Aprovado</option>
                                <option value="ajustar">Ajustar</option>
                                <option value="reprovado">Reprovado</option>
                            </select>
                        </label>
                    </div>
                    <label>Ingredientes<textarea name="ingredientes" rows="5" placeholder="Ingredientes, quantidades e observações técnicas"></textarea></label>
                    <label>Modo de preparo<textarea name="modo_preparo" rows="5" placeholder="Processo produtivo, temperaturas, tempos e controles"></textarea></label>
                    <label>Observações de teste<textarea name="observacoes_teste" rows="4"></textarea></label>
                </section>

                <div class="form-actions">
                    <button id="btnSalvar" class="btn primary" type="submit">Salvar produto</button>
                    <a class="btn ghost" href="produtos.html">Cancelar</a>
                </div>
                <p id="mensagemProduto" class="form-message"></p>
            </form>
        </main>
    </div>
    <script src="js/app.js"></script>
    <script src="js/novo_produto.js"></script>
</body>
</html>
