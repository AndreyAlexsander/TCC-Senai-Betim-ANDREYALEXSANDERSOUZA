<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funil | KAION</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <a class="logo text-logo" href="dashboard.html">KAION</a>
            <nav>
                <a href="dashboard.html">Dashboard</a>
                <a href="produtos.html">Produtos</a>
                <a class="active" href="funil.html">Funil</a>
                <a href="relatorios.html">Relatórios</a>
            </nav>
        </aside>

        <main class="content">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Acompanhe as etapas</p>
                    <h1>Funil de inovação</h1>
                </div>
                <a class="btn primary" href="novo_produto.html">Novo produto</a>
            </header>

            <section class="filters-row">
                <input type="search" id="buscaFunil" placeholder="Buscar produto">
                <select id="filtroStatus">
                    <option value="">Todos os status</option>
                    <option value="ideia">Ideia</option>
                    <option value="desenvolvimento">Desenvolvimento</option>
                    <option value="teste">Teste</option>
                    <option value="aprovacao">Aprovação</option>
                    <option value="lancado">Lançado</option>
                    <option value="arquivado">Arquivado</option>
                </select>
            </section>

            <section class="kanban" id="kanban"></section>
        </main>
    </div>
    <script src="js/app.js"></script>
    <script src="js/script_funil.js"></script>
</body>
</html>
